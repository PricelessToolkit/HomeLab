substitutions:
  friendly_name: RackCooler

esphome:
  name: rackcooling
  friendly_name: ${friendly_name}
  project:
    name: pricelesstoolkit.RackCooler
    version: "1.0"

preferences:
  flash_write_interval: 15min

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:
  level: DEBUG
  logs:
    climate: ERROR
    dht: WARN

api:
  encryption:
    key: "YourAPIKey"

ota:
  - platform: esphome
    password: "password"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  domain: .lab.lan
  #fast_connect: true

  ap:
    ssid: "Rackcooling Fallback Hotspot"
    password: "password"

captive_portal:


##############################
# TMP Sensor DS18B20
##############################

one_wire:  # Integrated Temperature Sensor. https://esphome.io/components/one_wire/gpio/
  - platform: gpio
    pin: GPIO5

##############################
# I2C BUS FOR OLED
##############################

i2c:
  sda: GPIO6        # OLED SDA
  scl: GPIO7        # OLED SCL
  scan: true

##############################
# FONT (REQUIRED FOR DISPLAY)
##############################

font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 12

  - file: "gfonts://Roboto"
    id: font_16
    size: 14

  - file: "gfonts://Roboto"
    id: font_18
    size: 18

##############################
# TEXT / INFO
##############################

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "${friendly_name} IP Address"

  - platform: template
    name: "${friendly_name} Uptime"
    id: uptime_human
    icon: mdi:clock-start

##############################
# SENSORS
##############################

sensor:
  - platform: wifi_signal
    name: "${friendly_name} WiFi Strength"
    update_interval: 60s

  - platform: uptime
    id: uptime_sensor
    name: "${friendly_name} Uptime Seconds"
    update_interval: 60s
    on_raw_value:
      then:
        - text_sensor.template.publish:
            id: uptime_human
            state: !lambda |-
              int seconds = (int)id(uptime_sensor).raw_state;
              int days = seconds / 86400;
              seconds %= 86400;
              int hours = seconds / 3600;
              seconds %= 3600;
              int minutes = seconds / 60;
              seconds %= 60;
              return (
                (days ? to_string(days) + "d " : "") +
                (hours ? to_string(hours) + "h " : "") +
                (minutes ? to_string(minutes) + "m " : "") +
                (to_string(seconds) + "s")
              ).c_str();

  ##################################
  # RACK TEMP Dallas Temperature Sensor
  ##################################

  - platform: dallas_temp
    address: 0xd2ba3db20164ff28
    name: "Rack Temperature"
    id: rack_temperature
    update_interval: 1s
  
  - platform: dallas_temp
    #index: 1
    address: 0xa0092280187be028
    name: "Intake Temperature"
    id: intake_temperature
    update_interval: 1s


  ##################################
  # FAN RPM (INTAKE + EXHAUST)
  ##################################

  # Intake fan RPM (tach on GPIO2 / D0)
  - platform: pulse_counter
    pin:
      number: GPIO2
      mode: INPUT_PULLUP
    id: intake_fan_rpm
    name: "${friendly_name} Intake Fan RPM"
    unit_of_measurement: "RPM"
    update_interval: 1s
    internal_filter: 10us
    count_mode:
      rising_edge: INCREMENT
      falling_edge: DISABLE
    filters:
      # ESPHome gives pulses/min; 2 pulses/rev → RPM = pulses/min / 2
      - multiply: 0.5

  # Exhaust fan RPM (tach on GPIO5 / D3)
  - platform: pulse_counter
    pin:
      number: GPIO4
      mode: INPUT_PULLUP
    id: exhaust_fan_rpm
    name: "${friendly_name} Exhaust Fan RPM"
    unit_of_measurement: "RPM"
    update_interval: 1s
    internal_filter: 10us
    count_mode:
      rising_edge: INCREMENT
      falling_edge: DISABLE
    filters:
      - multiply: 0.5

  # Actual PWM % applied to fans
  - platform: template
    name: "Fan Speed (PWM %)"
    id: fan_speed_pwm_voltage
    unit_of_measurement: "%"
    accuracy_decimals: 1

  ##################################
  # ROTARY ENCODER (KY-040) FOR TARGET TEMP
  ##################################

  - platform: rotary_encoder
    id: temp_encoder
    #name: "${friendly_name} Temp Encoder"

    pin_a:
      number: GPIO9     # KY-040 CLK
      mode:
        input: true
        #pullup: true

    pin_b:
      number: GPIO10     # KY-040 DT
      mode:
        input: true
        #pullup: true

    min_value: 15
    max_value: 40
    resolution: 1
    restore_mode: ALWAYS_ZERO
    publish_initial_value: false


    filters:
      - debounce: 5ms   # try 30–100ms, adjust as needed


    on_clockwise:
      then:
        - lambda: |-
            id(oled_on) = true;   // Turn OLED ON
            id(oled_switch).publish_state(true);   // Sync switch
        - script.execute: oled_auto_off   # Restart 30min timer
        - climate.control:
            id: rack_thermostat
            target_temperature: !lambda |-
              float t = id(rack_thermostat).target_temperature + 1.0f;
              if (t > 40.0f) t = 40.0f;
              return t;


    on_anticlockwise:
      then:
        - lambda: |-
            id(oled_on) = true;   // Turn OLED ON
            id(oled_switch).publish_state(true);   // Sync switch
        - script.execute: oled_auto_off   # Restart 30min timer
        - climate.control:
            id: rack_thermostat
            target_temperature: !lambda |-
              float t = id(rack_thermostat).target_temperature - 1.0f;
              if (t < 15.0f) t = 15.0f;
              return t;



##############################
# PID PARAMETERS (KP/KI/KD + DEADBAND)
##############################

number:
  # KP
  - platform: template
    name: "PID kp"
    id: pid_kp
    icon: mdi:chart-bell-curve
    restore_value: true
    initial_value: 0.3
    min_value: 0
    max_value: 50
    step: 0.001
    optimistic: true
    set_action:
      lambda: |-
        id(rack_thermostat).set_kp(x);

  # KI
  - platform: template
    name: "PID ki"
    id: pid_ki
    icon: mdi:chart-bell-curve
    restore_value: true
    initial_value: 0.0015
    min_value: 0
    max_value: 50
    step: 0.0001
    optimistic: true
    set_action:
      lambda: |-
        id(rack_thermostat).set_ki(x);

  # KD
  - platform: template
    name: "PID kd"
    id: pid_kd
    icon: mdi:chart-bell-curve
    restore_value: true
    initial_value: 0.0
    min_value: -50
    max_value: 50
    step: 0.001
    optimistic: true
    set_action:
      lambda: |-
        id(rack_thermostat).set_kd(x);

  # Deadband threshold low
  - platform: template
    name: "Dband Low"
    id: pid_th_low
    icon: mdi:chart-bell-curve
    restore_value: true
    initial_value: -1.0
    min_value: -20
    max_value: 0
    step: 0.1
    optimistic: true
    set_action:
      lambda: |-
        id(rack_thermostat).set_threshold_low(x);

  # Deadband threshold high
  - platform: template
    name: "Dband High"
    id: pid_th_high
    icon: mdi:chart-bell-curve
    restore_value: true
    initial_value: 0.4
    min_value: 0
    max_value: 20
    step: 0.1
    optimistic: true
    set_action:
      lambda: |-
        id(rack_thermostat).set_threshold_high(x);

  # Deadband ki multiplier
  - platform: template
    name: "Dband ki Multiplier"
    id: pid_ki_mult
    icon: mdi:chart-bell-curve
    restore_value: true
    initial_value: 0.04
    min_value: 0
    max_value: 0.2
    step: 0.01
    optimistic: true
    set_action:
      lambda: |-
        id(rack_thermostat).set_ki_multiplier(x);

##############################
# ENCODER PUSH BUTTON (RESET TARGET TEMP)
##############################

binary_sensor:
  - platform: gpio
    id: encoder_button
    name: "${friendly_name} Encoder Button"
    pin:
      number: GPIO8        # KY-040 SW
      mode:
        input: true
        pullup: true
      inverted: true
    on_press:
      then:
        - climate.control:
            id: rack_thermostat
            #target_temperature: 30.0
        - sensor.rotary_encoder.set_value:
            id: temp_encoder
            value: 0

##############################
# OUTPUTS: PWM (WITH MIN 20%)
##############################

output:
  # Hardware PWM @ 25kHz on GPIO3 (both fans' PWM tied here)
  - platform: ledc
    id: rack_pwm_hw
    pin: GPIO3
    frequency: 25000 Hz
    zero_means_zero: true

  # PID-controlled output with hard min 20%
  - platform: template
    id: pwm_ctrl
    type: float
    write_action:
      lambda: |-
        // If fans are disabled, force PWM to 0 (off) no matter what PID requests
        if (!id(fans_enabled)) {
          id(rack_pwm_hw).set_level(0.0f);
          id(fan_speed_pwm_voltage).publish_state(0.0f);
          return;
        }

        const float MIN_PWM = 0.20f;   // 20% minimum – fans never fully stop (when enabled)
        float level = state;           // PID gives 0.0..1.0

        if (level < MIN_PWM) level = MIN_PWM;
        if (level > 1.0f)    level = 1.0f;

        id(rack_pwm_hw).set_level(level);
        id(fan_speed_pwm_voltage).publish_state(level * 100.0f);


##############################
# PID CLIMATE CONTROLLER
##############################

climate:
  - platform: pid
    id: rack_thermostat
    name: "${friendly_name} Thermostat"
    sensor: rack_temperature

    default_target_temperature: 30 °C
    cool_output: pwm_ctrl

    visual:
      min_temperature: 20 °C
      max_temperature: 50 °C

    control_parameters:
      kp: 0.3
      ki: 0.0015
      kd: 0
      max_integral: 0.0
      output_averaging_samples: 1
      derivative_averaging_samples: 5

    deadband_parameters:
      threshold_high: 0.4 °C
      threshold_low: -1.0 °C
      kp_multiplier: 0.0
      ki_multiplier: 0.04
      kd_multiplier: 0.0
      deadband_output_averaging_samples: 15

##############################
# OLED DISPLAY
##############################


globals:
  - id: oled_on
    type: bool
    restore_value: yes
    initial_value: "true"

  - id: fans_enabled
    type: bool
    restore_value: yes
    initial_value: "true"

switch:
  - platform: template
    name: "OLED Display"
    id: oled_switch
    optimistic: true
    turn_on_action:
      - lambda: |-
          id(oled_on) = true;
    turn_off_action:
      - lambda: |-
          id(oled_on) = false;

  - platform: template
    name: "Fans Power"
    id: fans_power
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - lambda: |-
          id(fans_enabled) = true;

    turn_off_action:
      - lambda: |-
          id(fans_enabled) = false;
          id(rack_pwm_hw).set_level(0.0f);               // hard stop
          id(fan_speed_pwm_voltage).publish_state(0.0f); // show 0%

script:
  - id: oled_auto_off
    mode: restart
    then:
      - delay: 30min
      - lambda: |-
          id(oled_on) = false;    // Turn OLED OFF

display:
  - platform: ssd1306_i2c
    id: rack_oled
    model: "SSD1306 128x64"
    address: 0x3C
    update_interval: 1s

    lambda: |-
      // If OLED is turned off, clear and skip drawing
      if (!id(oled_on)) {
        it.clear();
        return;
      }

      char line[32];

      // Titles above the horizontal line
      it.print(5, 0, id(font_small), "INTAKE");
      it.print(70, 0, id(font_small), "EXHAUST");

      // Separators
      it.line(64, 0, 64, 63);    // Vertical line
      it.line(0, 14, 127, 14);   // Horizontal line

      // Intake temperature
      if (!isnan(id(intake_temperature).state)) {
        snprintf(line, sizeof(line), "%.1f C", id(intake_temperature).state);
      } else {
        snprintf(line, sizeof(line), "--.- C");
      }
      it.print(0, 16, id(font_18), line);

      // Rack temperature
      if (!isnan(id(rack_temperature).state)) {
        snprintf(line, sizeof(line), "%.1f C", id(rack_temperature).state);
      } else {
        snprintf(line, sizeof(line), "--.- C");
      }
      it.print(70, 16, id(font_18), line);

      // Target temperature
      if (!isnan(id(rack_thermostat).target_temperature)) {
        snprintf(line, sizeof(line), "Tar: %.1f", id(rack_thermostat).target_temperature);
      } else {
        snprintf(line, sizeof(line), "Tar: --.-");
      }
      it.print(70, 35, id(font_small), line);

      // PWM %
      if (!isnan(id(fan_speed_pwm_voltage).state)) {
        snprintf(line, sizeof(line), "PWM: %.0f %%", id(fan_speed_pwm_voltage).state);
      } else {
        snprintf(line, sizeof(line), "PWM: -- %%");
      }
      it.print(0, 35, id(font_small), line);

      // Intake fan RPM
      if (!isnan(id(intake_fan_rpm).state)) {
        snprintf(line, sizeof(line), "R %5.0f", id(intake_fan_rpm).state);
      } else {
        snprintf(line, sizeof(line), "R ---");
      }
      it.print(0, 48, id(font_16), line);

      // Exhaust fan RPM
      if (!isnan(id(exhaust_fan_rpm).state)) {
        snprintf(line, sizeof(line), "R %5.0f", id(exhaust_fan_rpm).state);
      } else {
        snprintf(line, sizeof(line), "R ---");
      }
      it.print(70, 48, id(font_16), line);

